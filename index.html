<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gargi Sansanwal Portfolio</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #f2f2f2;
            overflow-x: hidden;
        }

        #pdf-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f2f2f2;
        }

        .pdf-page {
            position: relative;
            background: white;
            margin: 0 auto;
            overflow: hidden;
        }

        .pdf-inner {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left top;
            transform: scaleX(1.01);
        }

        .pdf-page canvas {
            display: block;
            pointer-events: none;
        }

        .pdf-link {
            position: absolute;
            z-index: 20;
            cursor: pointer;
            background: transparent;
            display: block;
        }
    </style>
</head>

<body>
<div id="pdf-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="index.js"></script>
</body>
</html>
