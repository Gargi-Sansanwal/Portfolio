<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gargi Sansanwal Portfolio</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #f2f2f2;
            overflow-x: hidden;
        }

        #pdf-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f2f2f2;
        }

        .pdf-page {
            position: relative;
            background: white;
            margin: 0 auto;
            overflow: hidden;
        }

        .pdf-inner {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left top;
            transform: scaleX(1.01);
        }

        .pdf-page canvas {
            display: block;
            pointer-events: none;
        }

        .pdf-link {
            position: absolute;
            z-index: 20;
            cursor: pointer;
            background: transparent;
            display: block;
        }

        .loading-state {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
            color: #222;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .loading-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .loading-spinner {
            width: 34px;
            height: 34px;
            border: 3px solid #d4d4d4;
            border-top-color: #222;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin: 0;
            font-size: 15px;
            line-height: 1.4;
        }

        .loading-state.is-error .loading-spinner {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
<div id="loading-state" class="loading-state" role="status" aria-live="polite">
    <div class="loading-card">
        <div class="loading-spinner" aria-hidden="true"></div>
        <p id="loading-text" class="loading-text">Loading portfolio...</p>
    </div>
</div>
<div id="pdf-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="index.js"></script>
</body>
</html>
