<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gargi Sansanwal Portfolio</title>

    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css"
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
        }

        #pdf-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f2f2f2;
        }

        .pdf-page {
            position: relative;
            background: white;
            margin: 0 auto;
            overflow: hidden;
        }

        .pdf-page canvas {
            display: block;
        }

        .annotationLayer {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            pointer-events: none;
        }

        .annotationLayer section,
        .annotationLayer a {
            pointer-events: auto;
        }

        .annotationLayer a {
            cursor: pointer;
        }
    </style>
</head>

<body>
<div id="pdf-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
<script src="index.js"></script>
</body>
</html>
